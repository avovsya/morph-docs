<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Morph — documentation">
  <title>Morph Docs</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
  <style>
    :root {
      --theme-color: #c084fc;
      --sidebar-width: 240px;
      --base-font-size: 16px;
      --base-line-height: 1.7;
      --cover-background-color: #0f0f0f;
      --sidebar-background: #111;
      --content-max-width: 760px;
    }

    /* Subtle purple accent on links */
    .content a { color: var(--theme-color); }

    /* Screenshot placeholder styling */
    blockquote em { color: #888; font-style: italic; }

    /* Mobile adjustments */
    @media (max-width: 600px) {
      :root { --base-font-size: 15px; }
    }
  </style>
</head>
<body>
  <div id="app">Loading…</div>

  <script>
    window.$docsify = {
      name: 'Morph',
      nameLink: '/',
      repo: false,

      // Pages
      homepage: 'quickstart.md',
      loadSidebar: '_sidebar.md',
      subMaxLevel: 2,
      autoHeader: true,

      // Navigation
      mergeNavbar: true,
      routerMode: 'hash',

      // Search
      search: {
        depth: 3,
        noData: 'No results.',
        placeholder: 'Search docs…',
      },

      // Misc
      pagination: {
        previousText: '←',
        nextText: '→',
        crossChapter: true,
      },
    };
  </script>

  <!-- Docsify core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

  <!-- Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
</body>
</html>
